<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وكالة سفر الذهبي | Safir Al Dhahabi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-yellow-600">سفر الذهبي</h1>
            <div class="hidden md:flex gap-6 font-bold">
                <a href="#home">الرئيسية</a>
                <a href="#about">من نحن</a>
                <a href="#register">سجل طلبك</a>
                <a href="#contact">اتصل بنا</a>
            </div>
            <div class="text-xs font-bold text-gray-500">AR | FR | EN</div>
        </div>
    </nav>

    <header id="home" class="h-screen flex flex-col justify-center items-center text-white text-center px-4" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000'); background-size: cover; background-position: center;">
        <h2 class="text-4xl md:text-6xl font-black mb-6">رحلة العمرة بـ فخامة وخشوع</h2>
        <p class="text-xl mb-8">Safir Al Dhahabi | Travel Agency Since 2016</p>
    </header>

    <section id="register" class="py-20 max-w-2xl mx-auto px-4">
        <h3 class="text-3xl font-black text-emerald-900 mb-8 text-center">سجل معلوماتك (Join Us)</h3>
        <form action="https://formspree.io/f/xqeobgdl" method="POST" class="bg-white p-8 rounded-2xl shadow-lg space-y-4">
            <input type="text" name="name" placeholder="الاسم الكامل / Full Name" class="w-full p-3 border rounded-xl" required>
            <input type="email" name="email" placeholder="البريد الإلكتروني / Email" class="w-full p-3 border rounded-xl" required>
            <input type="tel" name="phone" placeholder="رقم الهاتف / Phone Number" class="w-full p-3 border rounded-xl" required>
            <select name="trip" class="w-full p-3 border rounded-xl">
                <option>اختر الرحلة / Choose Trip</option>
                <option>عمرة اقتصادية / Economy</option>
                <option>عمرة VIP / Premium</option>
            </select>
            <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-4 rounded-xl hover:bg-yellow-500 transition">إرسال الطلب / Send Request</button>
        </form>
    </section>

    <footer id="contact" class="bg-gray-900 text-white p-10 text-center">
        <h3 class="text-2xl font-bold mb-4">اتصل بنا / Contact Us</h3>
        <a href="https://wa.me/212665060839" class="text-green-400 text-xl font-bold">💬 WhatsApp: +212 665-060839</a>
        <p class="mt-4 text-gray-400 italic">We speak Arabic, French, and English</p>
    </footer>

</body>
</html>
